<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // Simple redirect to the main page with hash routing
      // HashRouter handles all routing client-side via URL hash
      var path = window.location.pathname;
      var base = '/Portfolio';
      
      // Extract the route from the path and redirect with hash
      if (path.startsWith(base)) {
        var route = path.replace(base, '').replace(/\/$/, '') || '/';
        window.location.replace(base + '/#' + route);
      } else {
        window.location.replace(base + '/');
      }
    </script>
  </head>
  <body></body>
</html>
